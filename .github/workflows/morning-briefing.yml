name: Morning Briefing

on:
  schedule:
    # Start at 12:45 UTC = 8:45 AM EDT (summer) / 7:45 AM EST (winter)
    # Pipeline prepares early, then sleeps until exactly 9:30 AM ET to send.
    - cron: '45 12 * * 1-5'
  workflow_dispatch:

jobs:
  send-briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare briefing (aggregate + synthesize + render)
        timeout-minutes: 40
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash
          VERIFY_SECTIONS: "true"
          VERIFY_ONLY_SECTIONS: markets_macro,corporate_earnings,economic_data
          GEMINI_SECTION_DELAY_SEC: "4"
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          TIMEZONE: America/New_York
        run: python main.py --prepare-only

      - name: Wait until 9:30 AM ET
        run: |
          python3 -c "
          import time, datetime, zoneinfo
          et = zoneinfo.ZoneInfo('America/New_York')
          now = datetime.datetime.now(et)
          target = now.replace(hour=9, minute=30, second=0, microsecond=0)
          wait = (target - now).total_seconds()
          if wait > 0:
              print(f'Prepared at {now.strftime(\"%H:%M:%S %Z\")}. Sleeping {int(wait)}s until 9:30 AM ET.')
              time.sleep(wait)
          else:
              print(f'Prepared at {now.strftime(\"%H:%M:%S %Z\")}. 9:30 AM ET already passed — sending now.')
          "

      - name: Send briefing
        timeout-minutes: 5
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          RECIPIENT_EMAILS: ${{ secrets.RECIPIENT_EMAILS }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          TIMEZONE: America/New_York
        run: python main.py --send-only
