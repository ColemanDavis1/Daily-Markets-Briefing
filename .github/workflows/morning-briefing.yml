name: Morning Briefing

on:
  workflow_dispatch:
  repository_dispatch:
    types: [trigger-send]

permissions:
  contents: read
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  send-briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download prepared briefing
        id: download
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID=$(gh run list \
            --workflow=prepare.yml \
            --status=success \
            --limit=1 \
            --json=databaseId \
            --jq='.[0].databaseId')
          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "No successful prepare run found."
            exit 1
          fi
          gh run download "$RUN_ID" --name briefing-ready --dir .
          echo "Downloaded briefing_ready.html from run $RUN_ID"

      - name: Send prepared briefing
        if: steps.download.outcome == 'success'
        timeout-minutes: 5
        env:
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "587"
          SMTP_USER: ${{ secrets.SENDER_EMAIL }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          RECIPIENT_EMAILS: ${{ secrets.RECIPIENT_EMAILS }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          TIMEZONE: America/New_York
        run: python main.py --send-only

      - name: Fallback — run full pipeline if no artifact
        if: steps.download.outcome == 'failure'
        timeout-minutes: 45
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash
          VERIFY_SECTIONS: "true"
          VERIFY_ONLY_SECTIONS: markets_macro,corporate_earnings,economic_data
          GEMINI_SECTION_DELAY_SEC: "4"
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "587"
          SMTP_USER: ${{ secrets.SENDER_EMAIL }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          RECIPIENT_EMAILS: ${{ secrets.RECIPIENT_EMAILS }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          TIMEZONE: America/New_York
        run: |
          echo "Prepare artifact not found — running full pipeline as fallback."
          python main.py
