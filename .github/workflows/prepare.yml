name: Prepare Briefing

on:
  schedule:
    # 6:00 AM EDT (10:00 UTC) / 5:00 AM EST — 3.5-hour runway before send
    - cron: '00 10 * * 1-5'
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Aggregate, synthesize, and render
        timeout-minutes: 40
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash
          VERIFY_SECTIONS: "true"
          VERIFY_ONLY_SECTIONS: markets_macro,corporate_earnings,economic_data
          GEMINI_SECTION_DELAY_SEC: "4"
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          TIMEZONE: America/New_York
        run: python main.py --prepare-only

      - name: Upload briefing as artifact
        uses: actions/upload-artifact@v4
        with:
          name: briefing-ready
          path: briefing_ready.html
          retention-days: 1
